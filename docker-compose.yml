services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pizza_simulator
      POSTGRES_USER: pizza
      POSTGRES_PASSWORD: pizza123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pizza -d pizza_simulator"]
      interval: 5s
      timeout: 3s
      retries: 5
